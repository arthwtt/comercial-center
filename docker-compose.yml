services:
  app:
    image: ${APP_IMAGE:-lead-mgmt:local}
    container_name: lead_mgmt_app
    restart: unless-stopped
    depends_on:
      commercial-center-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@commercial-center-db:5432/${POSTGRES_DB:-lead_mgmt}?schema=public
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-}
      ACCOUNT_ID: ${ACCOUNT_ID:-}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      DEFAULT_INBOX_ID: ${DEFAULT_INBOX_ID:-}
    ports:
      - "3000:3000"
    networks:
      - interna

  commercial-center-db:
    image: postgres:15-alpine
    container_name: commercial_center_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lead_mgmt}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lead_mgmt}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - interna

volumes:
  pgdata:

networks:
  interna:
    name: interna
