services:
  app:
    image: ${APP_IMAGE:-lead-mgmt:latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@commercial-center-db:5432/${POSTGRES_DB:-lead_mgmt}?schema=public
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-}
      ACCOUNT_ID: ${ACCOUNT_ID:-}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      DEFAULT_INBOX_ID: ${DEFAULT_INBOX_ID:-}
    networks:
      - interna
      - externa
    deploy:
      mode: replicated
      replicas: ${APP_REPLICAS:-1}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        traefik.enable: "true"
        traefik.docker.network: "externa"
        traefik.http.routers.lead-mgmt.rule: "Host(`${FRONTEND_HOST:-app.seudominio.com}`)"
        traefik.http.routers.lead-mgmt.entrypoints: "websecure"
        traefik.http.routers.lead-mgmt.tls: "true"
        traefik.http.routers.lead-mgmt.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-cf}"
        traefik.http.services.lead-mgmt.loadbalancer.server.port: "3000"

  commercial-center-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lead_mgmt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - interna
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lead_mgmt}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:

networks:
  interna:
    driver: overlay
    attachable: true
  externa:
    external: true
    name: externa
