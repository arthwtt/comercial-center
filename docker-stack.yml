services:
  app:
    image: lead-mgmt
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@commercial-center-db:5432/lead_mgmt?schema=public
      CHATWOOT_BASE_URL: ""
      ACCOUNT_ID: ""
      API_ACCESS_TOKEN: ""
      DEFAULT_INBOX_ID: ""
    networks:
      - interna
      - externa
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        traefik.enable: "true"
        traefik.docker.network: "externa"
        traefik.http.routers.lead-mgmt.rule: "Host(`app.seudominio.com`)"
        traefik.http.routers.lead-mgmt.entrypoints: "websecure"
        traefik.http.routers.lead-mgmt.tls: "true"
        traefik.http.routers.lead-mgmt.tls.certresolver: "cf"
        traefik.http.services.lead-mgmt.loadbalancer.server.port: "3000"

  commercial-center-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lead_mgmt
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - interna
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

volumes:
  pgdata:

networks:
  interna:
    driver: overlay
    attachable: true
  externa:
    external: true
    name: externa
